---
# Phase 1 - 전환 확정 버전 정의
# 기준: eGov_3.1_lib.pdf 원본 73개 라이브러리 분석
# 환경: eGovFrame 4.3 / Spring 5.3.37 / JDK 8 / Servlet 3.1

# 이 파일은 OpenRewrite recipe가 아닌 버전 참조 문서입니다.
# OpenRewrite에서 직접 실행하지 않으며, 각 recipe YAML 파일의 버전 근거 자료로 사용합니다.
# 실제 recipe는 egov-maven-dependency.yaml / egov-java-import.yaml / egov-spring-upgrade.yaml 참조

# ────────────────────────────────────────────
# 전환 확정 버전 (✅ 버전업 / ⚠️ 교체 대상)
# ────────────────────────────────────────────
versions:
  # eGov RTE
  egov.rte.version: "4.3.0"

  # Spring Framework (전 모듈 동일 버전 필수)
  spring.version: "5.3.37"
  spring.security.version: "5.8.14"

  # AspectJ
  aspectj.version: "1.9.21"

  # Persistence
  mybatis.version: "3.5.16"
  mybatis.spring.version: "2.1.2"

  # DBCP2 + Pool2 (DBCP1과 혼재 금지)
  commons.dbcp2.version: "2.9.0"
  commons.pool2.version: "2.12.0"

  # Oracle JDBC
  ojdbc8.version: "21.11.0.0"

  # Jackson 2.x (core + databind + annotations 버전 통일)
  jackson.version: "2.15.4"

  # Logging (log4j 전 모듈 동일 버전 필수)
  log4j2.version: "2.23.1"
  slf4j.version: "1.7.36"

  # PDF
  openpdf.version: "1.3.30"
  pdfbox.version: "2.0.31"

  # Security
  bouncycastle.version: "1.78.1"
  jasypt.version: "1.9.3"

  # SSH/SFTP (mwiede fork)
  jsch.version: "0.2.17"

  # XML
  jdom2.version: "2.0.6"

  # Scheduler
  quartz.version: "2.3.2"

  # Spring LDAP
  spring.ldap.version: "2.4.1"

  # Commons 계열
  commons.fileupload.version: "1.5"
  commons.beanutils.version: "1.9.4"
  commons.collections.version: "3.2.2"
  commons.io.version: "2.15.1"
  commons.lang3.version: "3.14.0"
  commons.validator.version: "1.7.0"
  commons.net.version: "3.11.1"
  commons.digester3.version: "3.2"

  # i18n
  icu4j.version: "75.1"

  # Mail
  javax.mail.version: "1.6.2"

  # Servlet
  javax.servlet.version: "4.0.1"

  # Tiles
  tiles.version: "3.0.8"

  # jackcess (MS Access)
  jackcess.version: "4.0.5"

# ────────────────────────────────────────────
# Phase 분류 참고
# ────────────────────────────────────────────
# Phase 1 (OpenRewrite 자동): 위 모든 버전 교체
#
# Phase 2 (Python 규칙 처리):
#   - DBCP1 속성명 변경 (maxActive→maxTotal 등) in XML
#   - Oracle driverClassName 변경 in XML
#   - context-common.xml classpath 경로 변경 (egovframework/rte → org/egovframe/rte)
#   - Quartz XML 스케줄러 설정 재작성
#   - log4j2.xml 정리
#
# Phase 3 (LLM 예외 처리):
#   - iBatis → MyBatis SQL XML 전환
#   - Spring 삭제 클래스 (SimpleFormController 등) 소스 재작성
#   - 사설/국산 라이브러리 연계 코드 보정
